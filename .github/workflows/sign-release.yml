name: Sign staged release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Draft release tag to verify and sign
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: sign-staged-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate staged release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          printf '%s\n' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$'
          test "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" = true
          bundle="warrant-$TAG-release-manifest.sigstore.json"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq ".assets[] | select(.name == \"$bundle\") | .name" | grep -q .; then
            echo "signature asset $bundle already exists; refusing to replace it" >&2
            exit 1
          fi
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Download and verify every staged asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          mkdir dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir dist
          test -f dist/SHA256SUMS
          (cd dist && sha256sum --check SHA256SUMS)
      - name: Sign and upload immutable manifest evidence
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          bundle="dist/warrant-$TAG-release-manifest.sigstore.json"
          identity="https://github.com/$GITHUB_REPOSITORY/.github/workflows/sign-release.yml@$GITHUB_REF"
          cosign sign-blob --yes --bundle "$bundle" dist/SHA256SUMS
          cosign verify-blob \
            --bundle "$bundle" \
            --certificate-identity "$identity" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-github-workflow-repository "$GITHUB_REPOSITORY" \
            --certificate-github-workflow-ref "$GITHUB_REF" \
            --certificate-github-workflow-sha "$GITHUB_SHA" \
            --certificate-github-workflow-trigger workflow_dispatch \
            dist/SHA256SUMS >/dev/null
          gh release upload "$TAG" "$bundle" --repo "$GITHUB_REPOSITORY"
